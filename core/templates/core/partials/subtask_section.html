<div class="space-y-2">
    {% for sub in task.subtasks.all %}
    <div class="flex items-center text-xs text-slate-600 bg-white p-2 rounded border border-slate-100">
        <i class="fa-solid fa-check-double mr-2 text-slate-300"></i>
        {{ sub.title }}
    </div>
    {% endfor %}
    <form hx-post="{% url 'core:add_subtask' task.pk %}" hx-target="closest .subtask-container" class="mt-2 flex gap-1">
        <input type="text" name="subtask_title" placeholder="New subtask..." class="text-[10px] w-full border-slate-200 rounded p-1">
        <button type="submit" class="bg-slate-800 text-white px-2 rounded text-[10px]">Add</button>
    </form>
</div>
