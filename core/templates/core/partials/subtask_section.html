<div class="subtask-container space-y-3">
    <div id="subtask-list" class="space-y-2">
        {% for sub in task.subtasks.all %}
        <div class="flex items-center justify-between group text-xs text-slate-600 bg-white p-2.5 rounded-xl border border-slate-100 hover:border-[#00c875]/30 transition-all shadow-sm">
            <div class="flex items-center">
                <input type="checkbox" 
                       {% if sub.is_completed %}checked{% endif %}
                       hx-post="{% url 'core:toggle_subtask' sub.pk %}"
                       hx-target="#progress-container"
                       hx-swap="outerHTML"
                       class="w-3.5 h-3.5 mr-3 rounded border-slate-300 text-[#00c875] focus:ring-[#00c875] transition-all cursor-pointer">
                
                <span class="font-medium {% if sub.is_completed %}line-through text-slate-400{% else %}text-slate-700{% endif %}">
                    {{ sub.title }}
                </span>
            </div>

            <button hx-delete="{% url 'core:delete_subtask' sub.pk %}" 
                    hx-target="closest .flex" 
                    hx-swap="delete"
                    hx-confirm="Remove this subtask?"
                    class="opacity-0 group-hover:opacity-100 text-slate-300 hover:text-rose-500 transition-all px-1">
                <i class="fa-solid fa-xmark text-[10px]"></i>
            </button>
        </div>
        {% empty %}
        <p id="no-subtasks" class="text-[10px] text-slate-400 italic text-center py-2">No steps added yet.</p>
        {% endfor %}
    </div>

    <form hx-post="{% url 'core:add_subtask' task.pk %}" 
          hx-target="closest .subtask-container" 
          hx-swap="outerHTML"
          hx-on::after-request="this.reset()"
          class="mt-4 flex gap-2">
        <input type="text" 
               name="subtask_title" 
               required
               placeholder="Add a step..." 
               class="text-[11px] w-full bg-slate-50 border-slate-200 rounded-lg px-3 py-2 focus:ring-2 focus:ring-[#00c875]/20 focus:border-[#00c875] outline-none transition-all">
        <button type="submit" class="bg-[#292f4c] hover:bg-slate-900 text-white px-3 rounded-lg text-[10px] font-bold uppercase tracking-wider transition-transform active:scale-95">
            Add
        </button>
    </form>
</div>
