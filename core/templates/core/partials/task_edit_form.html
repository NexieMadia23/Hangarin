<tr class="task-row bg-slate-50/80">
    <td colspan="6" class="p-4">
        <form hx-post="{% url 'core:task_edit' task.pk %}?inline=true" 
              hx-target="closest .task-row" 
              hx-swap="outerHTML" 
              class="flex items-center gap-4 bg-white p-3 rounded-2xl border-2 border-[#00c875] shadow-lg animate-in fade-in zoom-in duration-200">
            {% csrf_token %}
            
            <div class="flex-1">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1 ml-1">Quick Edit Title</label>
                <input type="text" 
                       name="title" 
                       value="{{ task.title }}" 
                       class="w-full bg-slate-50 border-none rounded-lg px-3 py-2 text-sm font-bold text-slate-700 focus:ring-2 focus:ring-[#00c875]/20 outline-none" 
                       autofocus>
            </div>

            <input type="hidden" name="status" value="{{ task.status }}">
            <input type="hidden" name="category" value="{{ task.category.id|default:'' }}">
            <input type="hidden" name="priority" value="{{ task.priority.id|default:'' }}">

            <div class="flex items-center gap-2 self-end pb-1">
                <button type="submit" 
                        class="bg-[#00c875] hover:bg-[#00b469] text-white text-[11px] font-black uppercase tracking-wider px-5 py-2.5 rounded-xl transition-all active:scale-95 shadow-md shadow-green-100">
                    <i class="fa-solid fa-check mr-1"></i> Save
                </button>
                
                <button hx-get="{% url 'core:task_list' %}?id={{ task.id }}" 
                        hx-target="closest .task-row" 
                        hx-swap="outerHTML"
                        type="button"
                        class="text-slate-400 hover:text-slate-600 text-[11px] font-bold uppercase px-4 py-2.5 transition-colors">
                    Cancel
                </button>
            </div>
        </form>
    </td>
</tr>
