{% load socialaccount %}

<div id="login-modal" class="relative bg-white dark:bg-[#0f141a] w-full max-w-md rounded-[2.5rem] p-10 shadow-2xl border border-slate-200 dark:border-slate-800 transition-all duration-300 animate-in fade-in zoom-in-95">
    
    <button hx-on:click="document.getElementById('modal-container').classList.add('hidden')" 
            class="absolute top-6 right-6 p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-400 transition-colors">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>

    <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center bg-[#00c875] w-14 h-14 rounded-2xl mb-4 shadow-lg shadow-green-500/20">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
            </svg>
        </div>
        <h2 class="text-2xl font-black text-slate-900 dark:text-white tracking-tighter uppercase">Hangar-In</h2>
        <div class="flex items-center justify-center gap-2 mt-2">
            <span class="h-[1px] w-4 bg-slate-200 dark:bg-slate-800"></span>
            <p class="text-slate-400 text-[9px] font-black uppercase tracking-[0.3em]">Authorized Entry Only</p>
            <span class="h-[1px] w-4 bg-slate-200 dark:bg-slate-800"></span>
        </div>
    </div>

    <div class="space-y-3.5 mb-8">
        <a href="{% provider_login_url 'google' %}" 
           class="w-full flex items-center justify-center gap-3 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 py-4 rounded-2xl font-bold text-[13px] text-slate-700 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-800 transition-all border-b-[3px] active:border-b-0 active:translate-y-[2px]">
            <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" class="w-5 h-5" alt="Google">
            Sign in with Google
        </a>

        <a href="{% provider_login_url 'github' %}" 
           class="w-full flex items-center justify-center gap-3 bg-slate-900 dark:bg-white text-white dark:text-slate-900 py-4 rounded-2xl font-bold text-[13px] hover:opacity-90 transition-all border-b-[3px] border-slate-700 dark:border-slate-300 active:border-b-0 active:translate-y-[2px]">
            <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
            Sign in with GitHub
        </a>
    </div>

    <div class="relative py-4 flex items-center justify-center">
        <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-100 dark:border-slate-800/50"></div></div>
        <div class="relative bg-white dark:bg-[#0f141a] px-4 flex items-center gap-2 text-slate-400">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            <span class="text-[9px] font-black uppercase tracking-[0.2em]">Secure Session</span>
        </div>
    </div>

    <div class="text-center mt-4">
        <p class="text-[10px] text-slate-400 font-medium px-8 leading-relaxed">
            By accessing this workspace, you agree to our 
            <a href="#" class="text-[#00c875] hover:text-[#00a662] transition-colors font-bold underline decoration-[#00c875]/30">Terms</a> 
            and <a href="#" class="text-[#00c875] hover:text-[#00a662] transition-colors font-bold underline decoration-[#00c875]/30">Privacy</a>.
        </p>
    </div>
</div>
